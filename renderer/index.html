<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;" />
  <title>Socrates</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top-center floating pill toolbar (drag handle) -->
    <div id="toolbar">
      <button class="tb-logo" id="logo-btn" title="Socrates"></button>
      <div class="tb-divider"></div>
      <div id="role-seg" class="tb-role" title="Learning vs. teaching — swaps the whole prompt set">
        <button data-role="learning" class="on">Learn</button>
        <button data-role="teaching">Teach</button>
      </div>
      <div class="tb-divider"></div>
      <button class="tb-hide" id="hide-btn"><span class="chev"></span><span>Hide</span></button>
      <div class="tb-divider"></div>
      <button class="tb-stop" id="stop-btn" title="Start / stop listening"></button>
    </div>

    <!-- Main assistant panel -->
    <div id="panel-wrap">
      <span id="live-dot" class="off"></span>
      <div id="panel" class="glass no-drag">
        <div id="messages"></div>

        <div id="action-row">
          <button class="act" data-mode="explain"><span class="ic"></span><span class="lbl">Explain</span></button>
          <span class="sep">•</span>
          <button class="act" data-mode="hint"><span class="ic"></span><span class="lbl">Nudge me</span></button>
          <span class="sep">•</span>
          <button class="act" data-mode="check"><span class="ic"></span><span class="lbl">Check understanding</span></button>
          <span class="sep">•</span>
          <button class="act" data-mode="recap"><span class="ic"></span><span class="lbl">Recap</span></button>
        </div>

        <div id="composer">
          <div id="input-area">
            <div id="placeholder">Ask about your screen or session, or <span class="keycap">Ctrl</span><span class="keycap">⏎</span> to Explain</div>
            <textarea id="input" rows="1" spellcheck="false"></textarea>
          </div>
          <div id="composer-bottom">
            <button id="smart-toggle" class="smart-pill"><span class="ic"></span><span>Smart</span></button>
            <button id="more-btn" class="more-btn" title="Settings"></button>
            <div class="spacer"></div>
            <button id="send-btn" title="Send"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div id="settings-scrim" class="hidden">
    <div id="settings" class="glass">
      <div class="s-head">
        <div class="s-title">Settings</div>
        <button id="s-close" class="s-close">Done</button>
      </div>
      <div class="s-body">
        <label class="s-label">Provider</label>
        <div class="s-seg" id="provider-seg">
          <button data-provider="openai">OpenAI</button>
          <button data-provider="anthropic">Anthropic</button>
          <button data-provider="gemini">Gemini</button>
        </div>

        <label class="s-label">API keys <span class="s-hint">stored locally in socrates-data.json</span></label>
        <div class="s-field"><span>OpenAI</span><input id="key-openai" type="password" placeholder="sk-..." autocomplete="off" /></div>
        <div class="s-field"><span>Anthropic</span><input id="key-anthropic" type="password" placeholder="sk-ant-..." autocomplete="off" /></div>
        <div class="s-field"><span>Gemini</span><input id="key-gemini" type="password" placeholder="AIza..." autocomplete="off" /></div>

        <label class="s-label">Models <span class="s-hint">fast = Smart off · smart = Smart on</span></label>
        <div class="s-field"><span>Fast</span><input id="model-fast" type="text" autocomplete="off" /></div>
        <div class="s-field"><span>Smart</span><input id="model-smart" type="text" autocomplete="off" /></div>

        <div class="s-status" id="s-status"></div>
      </div>
    </div>
  </div>

  <!-- First-run tutorial / walkthrough -->
  <div id="onboard-scrim" class="hidden">
    <div id="onboard" class="glass">
      <div class="ob-dots" id="ob-dots"></div>
      <div class="ob-icon" id="ob-icon"></div>
      <div class="ob-title" id="ob-title"></div>
      <div class="ob-body" id="ob-body"></div>
      <div class="ob-buttons" id="ob-buttons"></div>
      <div class="ob-actions">
        <button id="ob-skip" class="ob-ghost">Skip</button>
        <div class="spacer"></div>
        <button id="ob-back" class="ob-ghost">Back</button>
        <button id="ob-next" class="ob-primary">Next</button>
      </div>
    </div>
  </div>

  <script src="icons.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
